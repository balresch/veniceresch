name: Release

# Publishes to PyPI on every semver tag (e.g. v0.5.0) using Trusted
# Publishing (OIDC) — no API token stored in the repo. Configure the
# matching "pending publisher" once on PyPI:
#   PyPI project: veniceresch
#   Owner: balresch   Repository: veniceresch
#   Workflow: release.yml   Environment: pypi
# See https://docs.pypi.org/trusted-publishers/

on:
  push:
    tags:
      - "v[0-9]+.[0-9]+.[0-9]+"

permissions:
  contents: read

jobs:
  build:
    name: Build distribution
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
      - name: Verify tag matches package version
        run: |
          tag="${GITHUB_REF_NAME#v}"
          pkg="$(python -c "import tomllib, pathlib; print(tomllib.loads(pathlib.Path('pyproject.toml').read_text())['project']['version'])")"
          echo "tag=$tag  pyproject=$pkg"
          if [ "$tag" != "$pkg" ]; then
            echo "::error::Tag $GITHUB_REF_NAME ($tag) does not match pyproject version $pkg — bump pyproject.toml before tagging."
            exit 1
          fi
      - name: Install build tooling
        run: python -m pip install --upgrade build twine
      - name: Build sdist + wheel
        run: python -m build
      - name: Check distribution metadata
        run: python -m twine check dist/*
      - name: Upload artifacts
        uses: actions/upload-artifact@v7
        with:
          name: dist
          path: dist/

  publish:
    name: Publish to PyPI
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: pypi
      url: https://pypi.org/p/veniceresch
    permissions:
      id-token: write # required for Trusted Publishing (OIDC)
    steps:
      - name: Download built distributions
        uses: actions/download-artifact@v8
        with:
          name: dist
          path: dist/
      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
