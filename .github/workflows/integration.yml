name: Integration smoke

# Live smoke tests that hit the real Venice API. NOT part of the PR gate —
# they run only on manual dispatch or the weekly schedule, and only when the
# VENICE_API_KEY secret is configured. This catches upstream Venice drift
# (auth changes, content-type surprises, renamed fields) that the mocked unit
# suite cannot see. Keep it tiny: see tests/integration/test_live.py.

on:
  workflow_dispatch:
  schedule:
    # Mondays at 06:00 UTC.
    - cron: "0 6 * * 1"

concurrency:
  group: ${{ github.workflow }}
  cancel-in-progress: true

jobs:
  smoke:
    name: live smoke
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
          cache: pip
      - name: Install
        run: pip install -e ".[dev]"
      - name: Run integration smoke
        env:
          VENICE_API_KEY: ${{ secrets.VENICE_API_KEY }}
        run: pytest tests/integration -m integration -q
